services:
  mysql:
    image: mysql:8.0
    container_name: pmn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: bd_pm
    ports:
      - "3306:3306"
    volumes:
      - pmn_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: pmn-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: bd_pm
      DB_USERNAME: root
      DB_PASSWORD: admin
    ports:
      - "8080:8080"

volumes:
  pmn_mysql_data: